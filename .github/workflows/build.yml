name: Build Manager Clean

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # JOB 1: Chỉ biên dịch bộ công cụ ksud bằng Rust cho duy nhất bản 32-bit (armv7)
  build-ksud-binaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Rust và Target ARMv7
        run: |
          rustup update stable
          rustup target add armv7-linux-androideabi

      - name: Cài đặt công cụ Cross-compiler
        run: |
          cargo install cross --git https://github.com/cross-rs/cross --rev 66845c1

      - name: Biên dịch ksud bằng Rust (Chỉ chạy ARMv7)
        run: |
          CROSS_NO_WARNINGS=0 cross build --target armv7-linux-androideabi --release --manifest-path ./userspace/ksud/Cargo.toml

      - name: Upload ksud Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ksud-armv7
          path: userspace/ksud/target/armv7-linux-androideabi/release/ksud

  # JOB 2: Cài đặt NDK và build APK hoàn chỉnh (Chỉ chứa thư viện 32-bit)
  build-apk:
    needs: build-ksud-binaries
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./manager

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: false

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.1.10909125"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download ksud armv7
        uses: actions/download-artifact@v4
        with:
          name: ksud-armv7
          path: ksud-armv7

      # Chỉ tạo duy nhất thư mục armeabi-v7a và copy libksud.so vào đó
      - name: Copy ksud to app jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          cp -f ../ksud-armv7/ksud app/src/main/jniLibs/armeabi-v7a/libksud.so

      # Cấu hình Gradle chỉ build duy nhất bản armeabi-v7a để giải phóng dung lượng APK
      - name: Build Manager APK (ARMv7 Only)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: |
          {
            echo 'org.gradle.parallel=true'
            echo 'org.gradle.vfs.watch=true'
            echo 'org.gradle.jvmargs=-Xmx2048m'
            echo "ndk.dir=$ANDROID_NDK_HOME"
            # Ép Gradle lọc và bỏ qua các kiến trúc khác khi biên dịch JNI và đóng gói APK
            echo 'android.bundle.enableUncompressedNativeLibs=false'
          } >> gradle.properties
          
          # Truyền tham số ép sinh code C++ cho duy nhất armeabi-v7a
          ./gradlew clean assembleRelease -Pandroid.injected.build.abi=armeabi-v7a

      - name: Upload Manager APK
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU-Manager-Clean-ARMv7
          path: manager/app/build/outputs/apk/release/*.apk
