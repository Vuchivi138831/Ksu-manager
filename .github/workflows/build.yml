name: Build Manager Clean

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # JOB 1: Biên dịch bộ công cụ ksud bằng Rust
  build-ksud-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            rustflags: ""
          - target: armv7-linux-androideabi
            # Ép hệ thống dùng 64-bit offset để sửa lỗi hole-punch trên hệ điều hành 32-bit
            rustflags: "--cfg nix_egl_off_t_32" 
          - target: x86_64-linux-android
            rustflags: ""
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Rust và Target
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}

      - name: Cài đặt công cụ Cross-compiler
        run: |
          cargo install cross --git https://github.com/cross-rs/cross --rev 66845c1

      - name: Biên dịch ksud bằng Rust
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
          # Định nghĩa thêm cờ biên dịch C cho các thư viện liên kết nếu cần
          CFLAGS_armv7_linux_androideabi: "-D_FILE_OFFSET_BITS=64"
        run: |
          CROSS_NO_WARNINGS=0 cross build --target ${{ matrix.target }} --release --manifest-path ./userspace/ksud/Cargo.toml

      - name: Upload ksud Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ksud-${{ matrix.target }}
          path: userspace/ksud/target/${{ matrix.target }}/release/ksud

  # JOB 2: Cài đặt NDK, gom ksud và build APK hoàn chỉnh (Tự tạo libkernelsu.so 32/64-bit)
  build-apk:
    needs: build-ksud-binaries
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./manager

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: false

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.1.10909125"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Tải đầy đủ cả 3 bản ksud (bao gồm cả armv7) về máy ảo
      - name: Download ksud aarch64
        uses: actions/download-artifact@v4
        with:
          name: ksud-aarch64-linux-android
          path: ksud-arm64

      - name: Download ksud armv7
        uses: actions/download-artifact@v4
        with:
          name: ksud-armv7-linux-androideabi
          path: ksud-armv7

      - name: Download ksud x86_64
        uses: actions/download-artifact@v4
        with:
          name: ksud-x86_64-linux-android
          path: ksud-x86_64

      # Khôi phục lại thư mục armeabi-v7a để chứa libksud.so 32-bit của bạn
      - name: Copy ksud to app jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64
          
          cp -f ../ksud-arm64/ksud app/src/main/jniLibs/arm64-v8a/libksud.so
          cp -f ../ksud-armv7/ksud app/src/main/jniLibs/armeabi-v7a/libksud.so
          cp -f ../ksud-x86_64/ksud app/src/main/jniLibs/x86_64/libksud.so

      # Tiến hành build app bằng Gradle (Sẽ tự tạo libkernelsu.so cho cả 32-bit lẫn 64-bit)
      - name: Build Manager APK
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: |
          {
            echo 'org.gradle.parallel=true'
            echo 'org.gradle.vfs.watch=true'
            echo 'org.gradle.jvmargs=-Xmx2048m'
            echo "ndk.dir=$ANDROID_NDK_HOME"
          } >> gradle.properties
          ./gradlew clean assembleRelease

      # Xuất file APK ra ngoài
      - name: Upload Manager APK
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU-Manager-Clean
          path: manager/app/build/outputs/apk/release/*.apk
