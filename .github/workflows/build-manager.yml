name: Build KernelSU Manager APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Tối ưu RAM (10GB) và truyền thẳng tham số JVM args cho Gradle/R8
      - name: Build APK with Gradle
        run: |
          cd manager
          chmod +x gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx10g -XX:+UseG1GC -XX:+UnlockExperimentalVMOptions -XX:+UseStringDeduplication -XX:SoftRefLRUPolicyMSPerMB=1"

      # Lưu trữ file APK sau khi build xong
      - name: Upload Manager APK
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU_Manager
          path: manager/app/build/outputs/apk/release/*.apk
