name: Build and Push ksud Binary (ARMv7 32-bit)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust for ARMv7
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi

      - name: Build ksud
        run: |
          cd userspace/ksud
          
          # Cấu hình linker NDK có sẵn trên Runner
          export CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi24-clang
          
          cargo build --target armv7-linux-androideabi --release
          
          mkdir -p bin/armeabi-v7a
          cp target/armv7-linux-androideabi/release/ksud bin/armeabi-v7a/ksud

      - name: Commit and Push Binary
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: add prebuilt armeabi-v7a ksud binary"
          file_pattern: "userspace/ksud/bin/armeabi-v7a/ksud"
