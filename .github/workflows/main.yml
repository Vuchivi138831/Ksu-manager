name: Build and Push ksud Binary (ARMv7 32-bit)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout mã nguồn
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. Cài đặt Android NDK
      - name: Setup Android NDK
        uses: nsetup/setup-ndk@v2
        with:
          ndk-version: r25c

      # 3. Cài đặt Toolchain Rust & Target ARMv7 (32-bit)
      - name: Set up Rust for ARMv7
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi

      # 4. Biên dịch ksud bằng Cargo
      - name: Build ksud with Cargo
        run: |
          cd userspace/ksud
          
          # Thiết lập biến môi trường trỏ đến Clang của Android NDK
          export CC_armv7_linux_androideabi=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          export AR_armv7_linux_androideabi=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          
          cargo build --target armv7-linux-androideabi --release
          
          # Copy file vào bin/armeabi-v7a
          mkdir -p bin/armeabi-v7a
          cp target/armv7-linux-androideabi/release/ksud bin/armeabi-v7a/ksud

      # 5. Tự động commit và push file ksud mới lên repository
      - name: Commit and Push prebuilt ksud binary
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: add prebuilt armeabi-v7a ksud binary"
          file_pattern: "userspace/ksud/bin/armeabi-v7a/ksud"
