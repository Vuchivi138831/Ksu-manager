name: Unzip KernelSU Source

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip-source:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Lấy mã nguồn hiện tại từ repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Bước 2: Chỉ chạy duy nhất lệnh unzip bình thường ghi đè vào thư mục gốc
      - name: Unzip file
        run: |
          unzip -o KernelSU-0.9.5.zip -d ./

      # Bước 3: Xóa file ZIP gốc sau khi giải nén xong
      - name: Remove ZIP file
        run: |
          rm -f KernelSU-0.9.5.zip

      # Bước 4: Commit và đẩy code lên GitHub
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "Giải nén KernelSU-0.9.5.zip thành công"
          git push origin HEAD:${{ github.ref }}
