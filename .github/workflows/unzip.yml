name: Unzip Source

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Giải nén chính xác file KernelSU-0.9.5.zip
      - name: Unzip Source Code
        run: |
          if [ -f "KernelSU-0.9.5.zip" ]; then
            echo "Tìm thấy KernelSU-0.9.5.zip. Đang giải nén..."
            unzip -o KernelSU-0.9.5.zip
            rm -f KernelSU-0.9.5.zip # Xóa file zip để dọn dẹp repo
          else
            echo "LỖI: Không tìm thấy file KernelSU-0.9.5.zip ở thư mục gốc!"
            exit 1
          fi

      # 2. Commit và đẩy thư mục KernelSU-0.9.5 lên GitHub
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          
          if git diff-index --quiet HEAD --; then
            echo "Không có thay đổi nào để commit."
          else
            git commit -m "Giải nén mã nguồn vào thư mục KernelSU-0.9.5 thành công"
            git push origin HEAD:${{ github.ref }}
          fi
